# =============================================================
# Nginx del HOST Ubuntu — API reverse proxy (api.institutoclans.internal)
# =============================================================
# Copiar a: /etc/nginx/sites-available/institutoclans-api
# Enlazar: sudo ln -s /etc/nginx/sites-available/institutoclans-api /etc/nginx/sites-enabled/

server {
    listen 81;
    server_name api.institutoclans.internal;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts generosos para operaciones largas
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
