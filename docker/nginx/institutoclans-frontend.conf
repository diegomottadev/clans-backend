# =============================================================
# Nginx del HOST Ubuntu — Frontend (institutoclans.internal)
# =============================================================
# Copiar a: /etc/nginx/sites-available/institutoclans-frontend
# Enlazar: sudo ln -s /etc/nginx/sites-available/institutoclans-frontend /etc/nginx/sites-enabled/

server {
    listen 81;
    server_name institutoclans.internal;

    root /var/www/html/clans-view;
    index index.html;

    # SPA: todas las rutas caen en index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache de assets estaticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
