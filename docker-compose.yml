
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clans_app
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - app_storage:/var/www/storage
      - app_bootstrap_cache:/var/www/bootstrap/cache
    ports:
      - "9000:9000"
    entrypoint: [ "sh", "/usr/local/bin/entrypoint.sh" ]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - laravel

  web:
    image: nginx:alpine
    container_name: clans_web
    depends_on:
      - app
    volumes:
      - ./:/var/www
      - app_storage:/var/www/storage
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8080:80"
    networks:
      - laravel

networks:
  laravel:
    driver: bridge

volumes:
  app_storage:
  app_bootstrap_cache:
